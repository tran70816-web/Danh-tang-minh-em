<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Heart Beat Effect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Cấu hình đoạn chữ hiển thị phía trên trái tim */
        .message-container {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 85%;
            max-width: 600px;
            z-index: 2; /* Nổi lên trên trái tim */
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 33, 33, 0.6);
            line-height: 1.6;
        }
        .main-text {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .highlight-text {
            font-size: 18px;
            font-weight: 600;
            color: #ff4d4d;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .korean-text {
            font-size: 16px;
            font-weight: 500;
            color: #ff8585;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <!-- Đoạn lời nhắn ngọt ngào -->
    <div class="message-container">
        <p class="main-text">Thật ra mình đã thích bạn từ những ngày đầu tiên gặp mặt, nhưng vì khoảng cách cô trò nên đến tận bây giờ mới dám ngỏ lời.</p>
        <p class="highlight-text">Mình thật sự rất thích bạn!</p>
        <!-- Dòng chữ tiếng Hàn bổ sung ở dưới -->
        <p class="korean-text">난 너를 진심으로 사랑하고, 늘 함께하고 싶어.</p>
    </div>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const HEART_COLOR = '#ff2121';
        // Tự động điều chỉnh kích thước trái tim dựa theo màn hình để không đè vào chữ
        const IMAGE_ENLARGE = window.innerWidth < 500 ? 8.5 : 12.5; 
        
        function heartFunction(t, shrinkRatio = IMAGE_ENLARGE) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
// Đẩy tâm trái tim dịch xuống một chút để nhường chỗ cho dòng chữ phía trên
            const centerY = canvas.height / 2 + (window.innerWidth < 500 ? 55 : 65);
            return {
                x: x * shrinkRatio + canvas.width / 2,
                y: y * shrinkRatio + centerY
            };
        }

        function scatterInside(x, y, beta = 0.15) {
            const ratioX = -beta * Math.log(Math.random());
            const ratioY = -beta * Math.log(Math.random());
            const centerY = canvas.height / 2 + (window.innerWidth < 500 ? 55 : 65);
            const dx = ratioX * (x - canvas.width / 2);
            const dy = ratioY * (y - centerY);
            return { x: x - dx, y: y - dy };
        }

        function shrink(x, y, ratio) {
            const centerY = canvas.height / 2 + (window.innerWidth < 500 ? 55 : 65);
            const force = -1 / Math.pow(Math.pow(x - canvas.width / 2, 2) + Math.pow(y - centerY, 2), 0.6);
            const dx = ratio * force * (x - canvas.width / 2);
            const dy = ratio * force * (y - centerY);
            return { x: x - dx, y: y - dy };
        }

        function curve(p) {
            return 2 * (2 * Math.sin(4 * p)) / (2 * Math.PI);
        }

        const points = [];
        const edgeDiffusionPoints = [];
        const centerDiffusionPoints = [];

        for (let i = 0; i < 2000; i++) {
            const t = Math.random() * Math.PI * 2;
            points.push(heartFunction(t));
        }

        points.forEach(p => {
            for (let i = 0; i < 3; i++) {
                edgeDiffusionPoints.push(scatterInside(p.x, p.y, 0.05));
            }
        });

        for (let i = 0; i < 4000; i++) {
            const p = points[Math.floor(Math.random() * points.length)];
            centerDiffusionPoints.push(scatterInside(p.x, p.y, 0.17));
        }

        function calcPosition(x, y, ratio) {
            const centerY = canvas.height / 2 + (window.innerWidth < 500 ? 55 : 65);
            const force = 1 / Math.pow(Math.pow(x - canvas.width / 2, 2) + Math.pow(y - centerY, 2), 0.520);
            const dx = ratio * force * (x - canvas.width / 2) + (Math.random() > 0.5 ? 1 : -1) * Math.random();
            const dy = ratio * force * (y - centerY) + (Math.random() > 0.5 ? 1 : -1) * Math.random();
            return { x: x - dx, y: y - dy };
        }

        let frame = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.16)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const ratio = 10 * curve((frame / 23) * Math.PI);
            const haloRadius = Math.floor(4 + 6 * (1 + curve((frame / 23) * Math.PI)));
            const haloNumber = Math.floor(2000 + 3000 * Math.pow(Math.abs(curve((frame / 23) * Math.PI)), 2));

            ctx.fillStyle = HEART_COLOR;

            for (let i = 0; i < haloNumber; i++) {
                const t = Math.random() * Math.PI * 2;
let p = heartFunction(t, IMAGE_ENLARGE + 0.6);
                p = shrink(p.x, p.y, haloRadius);
                p.x += (Math.random() * 28 - 14);
                p.y += (Math.random() * 28 - 14);
                const size = Math.random() > 0.3 ? 1 : 2;
                ctx.fillRect(p.x, p.y, size, size);
            }

            points.forEach(pt => {
                const p = calcPosition(pt.x, pt.y, ratio);
                const size = Math.floor(Math.random() * 3) + 1;
                ctx.fillRect(p.x, p.y, size, size);
            });

            edgeDiffusionPoints.forEach(pt => {
                const p = calcPosition(pt.x, pt.y, ratio);
                const size = Math.floor(Math.random() * 2) + 1;
                ctx.fillRect(p.x, p.y, size, size);
            });

            centerDiffusionPoints.forEach(pt => {
                const p = calcPosition(pt.x, pt.y, ratio);
                const size = Math.floor(Math.random() * 2) + 1;
                ctx.fillRect(p.x, p.y, size, size);
            });

            frame++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
